<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINX GLOBAL | AI REMOTE PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: rgba(255,255,255,0.06); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; transition: 0.5s; }
        .header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); sticky; top:0; z-index:100; }
        .logo { font-family: 'Cinzel'; color: var(--gold); font-size: 24px; letter-spacing: 5px; cursor: pointer; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .section-header { color: var(--gold); font-family: 'Cinzel'; font-size: 18px; border-left: 5px solid var(--gold); padding-left: 15px; margin: 30px 0 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 25px; text-align: center; transition: 0.3s; }
        .btn { background: var(--gold); color: #000; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; text-transform: uppercase; font-size: 11px; }
        #search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: #fff; margin-bottom: 20px; display: none; font-family: 'Poppins'; }
        .promo-banner { background: var(--gold); color: #000; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; display: none; }
    </style>
</head>
<body>

    <div id="promo" class="promo-banner">LOADING SPECIAL OFFERS...</div>

    <div class="header">
        <div class="logo">DINX</div>
        <div style="font-size: 10px; color: var(--gold);" id="user-id">ID: DINX_052</div>
    </div>

    <div class="container">
        <input type="text" id="search-box" placeholder="Search flights or brands...">

        <div class="section-header">Airlines & Global Booking</div>
        <div class="grid">
            <div class="card">
                <h3 id="air-name">Emirates</h3>
                <p>Departure: <span id="air-time" style="color:var(--gold)">--:--</span></p>
                <h2 id="air-price" style="margin:10px 0;">$0</h2>
                <button class="btn">Book Now</button>
            </div>
        </div>

        <div class="section-header">Food & Dining</div>
        <div class="grid">
            <div class="card">
                <h3>KFC Pakistan</h3>
                <p>Status: <span id="kfc-status" style="font-weight:bold;">CHECKING...</span></p>
                <button class="btn">Order Now</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfLCFUuPgyj0FFO_zWgIEr3hZyordYhEx9EbJivjWR92jU9QLV8EYr5-2LOBPej3U52fbTfEu-kbSY/pub?output=csv";

        async function updateFromSheet() {
            try {
                const response = await fetch(SHEET_CSV);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));

                // Sheet Row 1: Search Bar Logic
                if (rows[0][1].trim() === "ON") {
                    document.getElementById('search-box').style.display = 'block';
                } else {
                    document.getElementById('search-box').style.display = 'none';
                }

                // Sheet Row 2: Emirates Price & Time
                document.getElementById('air-price').innerText = rows[1][1];
                document.getElementById('air-time').innerText = rows[1][2];

                // Sheet Row 3: KFC Status
                let kfc = document.getElementById('kfc-status');
                kfc.innerText = rows[2][1];
                kfc.style.color = (rows[2][1].trim() === "OPEN") ? "#27ae60" : "#e74c3c";

                // Sheet Row 4: Promo Message
                if (rows[3][1].trim() !== "") {
                    document.getElementById('promo').style.display = 'block';
                    document.getElementById('promo').innerText = rows[3][1];
                }

                // Sheet Row 5: Theme Color
                let color = rows[4][1].trim();
                document.documentElement.style.setProperty('--gold', color);

                console.log("DINX Sync: Success");
            } catch (error) {
                console.error("Sync Error:", error);
            }
        }

        // Har 5 second baad sheet check karein (Live Update)
        setInterval(updateFromSheet, 5000);
        updateFromSheet();
    </script>
</body>
</html>
