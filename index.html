

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>DINXPORTAL | Global Airlines & Food Control</title>
    <meta name="description" content="DINXPORTAL - Pakistan's premier hub for real-time airline prices, food brand updates, and crypto rates.">
    <meta name="keywords" content="dinxportal, dinx portal, dinx global, arbitrage pakistan, airline prices">
    <meta name="author" content="DINX">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: rgba(255,255,255,0.06); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        .header { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; top:0; z-index:100; }
        .logo { font-family: 'Cinzel'; color: var(--gold); font-size: 24px; letter-spacing: 5px; }
        .container { padding: 20px; max-width: 1200px; margin: auto; }
        .section-header { color: var(--gold); font-family: 'Cinzel'; font-size: 18px; border-left: 5px solid var(--gold); padding-left: 15px; margin: 30px 0 15px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; }
        .btn { background: var(--gold); color: #000; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 11px; }
        #search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: #fff; margin-bottom: 20px; display: none; }
        .promo-banner { background: var(--gold); color: #000; text-align: center; padding: 5px; font-weight: bold; font-size: 12px; display: none; }
        .price-tag { font-size: 24px; font-weight: bold; margin: 10px 0; color: #fff; }
        .status-tag { font-weight: bold; font-size: 11px; padding: 4px 10px; border-radius: 5px; display: inline-block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="promo" class="promo-banner">OFFER LOADING...</div>

    <div class="header">
        <div class="logo">DINXPORTAL</div>
        <div style="font-size: 10px; color: var(--gold);">SECURE PORTAL V2</div>
    </div>

    <div class="container">
        <input type="text" id="search-box" placeholder="Search dinxportal...">

        <div class="section-header">Airlines</div>
        <div class="grid">
            <div class="card"><h3>Emirates</h3><p id="t1">--</p><div class="price-tag" id="p1">$0</div><button class="btn">Details</button></div>
            <div class="card"><h3>Qatar Airways</h3><p id="t2">--</p><div class="price-tag" id="p2">$0</div><button class="btn">Details</button></div>
            <div class="card"><h3>Fly Dubai</h3><p id="t3">--</p><div class="price-tag" id="p3">$0</div><button class="btn">Details</button></div>
        </div>

        <div class="section-header">Food Status</div>
        <div class="grid">
            <div class="card"><h3>KFC</h3><span id="s1" class="status-tag">...</span><button class="btn">Order</button></div>
            <div class="card"><h3>McDonald's</h3><span id="s2" class="status-tag">...</span><button class="btn">Order</button></div>
            <div class="card"><h3>Hardee's</h3><span id="s3" class="status-tag">...</span><button class="btn">Order</button></div>
        </div>

        <div class="section-header">Crypto Rates</div>
        <div class="grid">
            <div class="card"><h3>Binance P2P</h3><p>USDT/PKR</p><div class="price-tag" id="crypto" style="color:#f3ba2f">0.00</div><button class="btn">Trade</button></div>
        </div>
    </div>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfLCFUuPgyj0FFO_zWgIEr3hZyordYhEx9EbJivjWR92jU9QLV8EYr5-2LOBPej3U52fbTfEu-kbSY/pub?output=csv";

        async function syncEmpire() {
            try {
                const res = await fetch(SHEET_CSV);
                const text = await res.text();
                const r = text.split('\n').map(row => row.split(','));

                document.getElementById('search-box').style.display = (r[0][1].trim() === "ON") ? 'block' : 'none';
                document.getElementById('p1').innerText = r[1][1]; document.getElementById('t1').innerText = r[1][2];
                document.getElementById('p2').innerText = r[2][1]; document.getElementById('t2').innerText = r[2][2];
                document.getElementById('p3').innerText = r[3][1]; document.getElementById('t3').innerText = r[3][2];
                updateStatus('s1', r[4][1]); updateStatus('s2', r[5][1]); updateStatus('s3', r[6][1]);
                document.getElementById('crypto').innerText = r[7][1];
                if(r[8][1].trim()) { document.getElementById('promo').style.display='block'; document.getElementById('promo').innerText=r[8][1]; }
                document.documentElement.style.setProperty('--gold', r[9][1].trim());
            } catch (e) { console.log("Sync Error"); }
        }

        function updateStatus(id, val) {
            let el = document.getElementById(id);
            el.innerText = val.trim();
            el.style.background = (val.trim() === "OPEN") ? "#27ae60" : "#e74c3c";
        }

        setInterval(syncEmpire, 5000);
        syncEmpire();
    </script>
</body>
</html>
