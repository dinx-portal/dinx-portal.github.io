<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINXPORTAL | Live Rates & Affiliate Hub</title>
    <meta name="description" content="DINXPORTAL - Real-time airline booking, food status, and crypto rates.">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: rgba(255,255,255,0.06); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        .header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top:0; z-index:100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel'; color: var(--gold); font-size: 22px; letter-spacing: 3px; }
        .container { padding: 20px; max-width: 1100px; margin: auto; }
        .section-header { color: var(--gold); font-family: 'Cinzel'; font-size: 16px; border-left: 4px solid var(--gold); padding-left: 12px; margin: 25px 0 15px; text-align: left; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 20px; transition: 0.3s; }
        .price-tag { font-size: 22px; font-weight: bold; margin: 10px 0; color: #fff; }
        .btn { background: var(--gold); color: #000; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .btn:hover { background: #fff; transform: scale(1.02); }
        .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        #search-box { width: 90%; padding: 10px; border-radius: 8px; border: 1px solid var(--gold); background: #111; color: #fff; margin-bottom: 20px; display: none; }
        .promo-banner { background: var(--gold); color: #000; padding: 6px; font-weight: bold; font-size: 12px; display: none; }
    </style>
</head>
<body>

    <div id="promo" class="promo-banner">CHECKING LIVE UPDATES...</div>
    <div class="header"><div class="logo">DINXPORTAL</div><div style="font-size: 10px; color: var(--gold);">ADMIN SYNC: ON</div></div>

    <div class="container">
        <input type="text" id="search-box" placeholder="Search dinxportal...">

        <div class="section-header">Airlines (Commission Links)</div>
        <div class="grid">
            <div class="card"><h3>Emirates</h3><p id="t1">--</p><div class="price-tag" id="p1">$0</div><button class="btn" id="b1">Book Now</button></div>
            <div class="card"><h3>Qatar Airways</h3><p id="t2">--</p><div class="price-tag" id="p2">$0</div><button class="btn" id="b2">Book Now</button></div>
            <div class="card"><h3>Fly Dubai</h3><p id="t3">--</p><div class="price-tag" id="p3">$0</div><button class="btn" id="b3">Book Now</button></div>
        </div>

        <div class="section-header">Food (Order Now)</div>
        <div class="grid">
            <div class="card"><h3>KFC</h3><div id="s1" class="status-tag">...</div><button class="btn" id="fb1">Order Now</button></div>
            <div class="card"><h3>McDonald's</h3><div id="s2" class="status-tag">...</div><button class="btn" id="fb2">Order Now</button></div>
            <div class="card"><h3>Hardee's</h3><div id="s3" class="status-tag">...</div><button class="btn" id="fb3">Order Now</button></div>
        </div>

        <div class="section-header">Finance & Crypto</div>
        <div class="grid">
            <div class="card"><h3>Binance P2P</h3><p>Live USDT Rate</p><div class="price-tag" id="crypto" style="color:#f3ba2f">0.00</div><button class="btn" id="cb1">Trade & Earn</button></div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfLCFUuPgyj0FFO_zWgIEr3hZyordYhEx9EbJivjWR92jU9QLV8EYr5-2LOBPej3U52fbTfEu-kbSY/pub?output=csv";

        async function updateSite() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const r = data.split('\n').map(row => row.split(','));

                // Control Search & Banner
                document.getElementById('search-box').style.display = (r[0][1].trim() === "ON") ? 'block' : 'none';
                if(r[8][1].trim()) { document.getElementById('promo').style.display='block'; document.getElementById('promo').innerText=r[8][1]; }
                document.documentElement.style.setProperty('--gold', r[9][1].trim());

                // Airline Sync (Rows 2-4)
                syncCard('p1', 't1', 'b1', r[1]);
                syncCard('p2', 't2', 'b2', r[2]);
                syncCard('p3', 't3', 'b3', r[3]);

                // Food Sync (Rows 5-7)
                syncFood('s1', 'fb1', r[4]);
                syncFood('s2', 'fb2', r[5]);
                syncFood('s3', 'fb3', r[6]);

                // Crypto Sync (Row 8)
                document.getElementById('crypto').innerText = r[7][1];
                document.getElementById('cb1').onclick = () => window.open(r[7][3].trim(), '_blank');

            } catch (e) { console.error("Sync Failed"); }
        }

        function syncCard(pId, tId, bId, data) {
            document.getElementById(pId).innerText = data[1];
            document.getElementById(tId).innerText = data[2];
            document.getElementById(bId).onclick = () => window.open(data[3].trim(), '_blank');
        }

        function syncFood(sId, bId, data) {
            let s = document.getElementById(sId);
            s.innerText = data[1].trim();
            s.style.background = (data[1].trim() === "OPEN") ? "#27ae60" : "#e74c3c";
            document.getElementById(bId).onclick = () => window.open(data[3].trim(), '_blank');
        }

        setInterval(updateSite, 5000);
        updateSite();
    </script>
</body>
</html>
