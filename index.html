<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINX PORTAL | VIP Access</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #d4af37; /* Gold Color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        .brand-logo {
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
        }
        .tagline {
            font-size: 18px;
            letter-spacing: 5px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 50px;
        }
        .protocol-btn {
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            transition: 0.5s;
            text-decoration: none;
            text-transform: uppercase;
        }
        .protocol-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 30px #d4af37;
        }
    </style>
</head>
<body>
    <div class="brand-logo">DINX</div>
    <div class="tagline">The Elite Legacy | Protocol Portal</div>
    <div>
        <a href="#" class="protocol-btn">Enter VIP Lounge</a>
    </div>
</body>
</html>
