<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINXPORTAL | Ultimate Digital Hub</title>
    <meta name="description" content="DINXPORTAL - Real-time airline booking, food status, and crypto rates with user wallet.">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #050505; --card: rgba(255,255,255,0.08); }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; transition: 0.3s; overflow-x: hidden; }
        
        /* Header & Wallet Section */
        .header { background: #000; padding: 12px 15px; border-bottom: 2px solid var(--gold); position: sticky; top:0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cinzel'; color: var(--gold); font-size: 18px; letter-spacing: 2px; }
        .wallet-area { background: #111; padding: 5px 10px; border: 1px solid var(--gold); border-radius: 8px; display: flex; align-items: center; gap: 5px; }
        #user-id-input { background: transparent; border: none; color: var(--gold); width: 65px; font-size: 11px; outline: none; }
        #balance-display { font-weight: bold; font-size: 11px; color: #fff; min-width: 50px; }
        
        /* Layout */
        .container { padding: 15px; max-width: 1100px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        
        /* Components */
        .btn { background: var(--gold); color: #000; padding: 10px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; font-size: 10px; margin-top: 10px; text-transform: uppercase; }
        .reward-banner { background: linear-gradient(90deg, #d4af37, #f3ba2f); color: #000; padding: 12px; font-size: 11px; font-weight: bold; margin-bottom: 15px; border-radius: 8px; cursor: pointer; display: none; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        .whatsapp-btn { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: #fff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1001; text-decoration: none; }
        .alert-bell { font-size: 22px; cursor: pointer; position: relative; }
        .alert-dot { position: absolute; top: 0; right: 0; width: 8px; height: 8px; background: #ff0000; border-radius: 50%; display: none; border: 1px solid #000; }
        
        #history-section { background: #111; margin-top: 25px; padding: 15px; border-radius: 10px; text-align: left; font-size: 11px; border: 1px solid #222; }
        .lang-btn { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        h4 { color: var(--gold); text-align: left; font-family: 'Cinzel'; margin: 25px 0 15px; border-left: 3px solid var(--gold); padding-left: 10px; font-size: 14px; }
        #search-box { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--gold); background: #111; color: #fff; box-sizing: border-box; display: none; }
    </style>
</head>
<body>

    <div id="reward" class="reward-banner" onclick="window.open('https://wa.me/923260485212')">🎁 DAILY REWARD: GET RS. 20 BONUS TODAY! CLICK TO CLAIM</div>

    <div class="header">
        <div class="logo">DINXPORTAL</div>
        <div style="display:flex; gap:12px; align-items:center;">
            <button class="lang-btn" onclick="toggleLang()">URDU / EN</button>
            <div class="alert-bell" onclick="alert('Check live updates for new offers!')">🔔<div id="alert-dot" class="alert-dot"></div></div>
            <div class="wallet-area">
                <input type="text" id="user-id-input" placeholder="Enter ID" oninput="syncAllData()">
                <div id="balance-display">RS. 0</div>
            </div>
        </div>
    </div>

    <div class="container">
        <input type="text" id="search-box" placeholder="Search for rates, brands, or history...">

        <h4 id="h-air">AIRLINES & TRAVEL</h4>
        <div class="grid">
            <div class="card"><h5>Emirates</h5><p id="p1" style="font-weight:bold; font-size: 18px;">$0</p><p id="t1" style="font-size: 10px; color: #aaa;">--</p><button class="btn" id="b1">BOOK NOW</button></div>
            <div class="card"><h5>Qatar Airways</h5><p id="p2" style="font-weight:bold; font-size: 18px;">$0</p><p id="t2" style="font-size: 10px; color: #aaa;">--</p><button class="btn" id="b2">BOOK NOW</button></div>
            <div class="card"><h5>Fly Dubai</h5><p id="p3" style="font-weight:bold; font-size: 18px;">$0</p><p id="t3" style="font-size: 10px; color: #aaa;">--</p><button class="btn" id="b3">BOOK NOW</button></div>
        </div>

        <h4 id="h-food">BRANDS & FINANCE</h4>
        <div class="grid">
            <div class="card"><h5>KFC Status</h5><div id="s1" style="font-size:12px; font-weight:bold; margin-bottom: 5px;">...</div><button class="btn" id="fb1">ORDER NOW</button></div>
            <div class="card"><h5>Binance P2P</h5><div id="crypto" style="font-size:18px; color:#f3ba2f; font-weight: bold;">0.00</div><p style="font-size: 9px;">Live USDT/PKR</p><button class="btn" id="cb1" style="background:#f3ba2f">TRADE</button></div>
        </div>

        <div id="history-section">
            <strong id="h-hist">Recent Activity:</strong>
            <p id="user-history" style="color: #bbb; margin-top: 5px;">Enter your ID to view your account history...</p>
        </div>
    </div>

    <a href="https://wa.me/923260485212" class="whatsapp-btn" title="Contact Admin">💬</a>

    <script>
        const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfLCFUuPgyj0FFO_zWgIEr3hZyordYhEx9EbJivjWR92jU9QLV8EYr5-2LOBPej3U52fbTfEu-kbSY/pub?output=csv";
        let isUrdu = false;

        async function syncAllData() {
            try {
                const res = await fetch(SHEET_CSV + '&cache=' + new Date().getTime());
                const text = await res.text();
                const r = text.split('\n').map(row => row.split(','));

                // 1. Global Controls
                document.getElementById('search-box').style.display = (r[0][1].trim() === "ON") ? 'block' : 'none';
                document.documentElement.style.setProperty('--gold', r[9][1].trim() || "#d4af37");
                document.getElementById('reward').style.display = (r[14] && r[14][1].trim() === "ON") ? 'block' : 'none';
                document.getElementById('alert-dot').style.display = (r[15] && r[15][1].trim() === "ON") ? 'block' : 'none';
                if(r[8][1].trim()) { document.getElementById('reward').innerText = r[8][1]; }

                // 2. Pricing & Affiliate Links
                syncItem('p1', 't1', 'b1', r[1]);
                syncItem('p2', 't2', 'b2', r[2]);
                syncItem('p3', 't3', 'b3', r[3]);
                
                // Food Status & Link
                let kfcStatus = r[4][1].trim();
                document.getElementById('s1').innerText = kfcStatus;
                document.getElementById('s1').style.color = (kfcStatus === "OPEN") ? "#27ae60" : "#e74c3c";
                document.getElementById('fb1').onclick = () => window.open(r[4][3].trim(), '_blank');

                // Crypto Rate
                document.getElementById('crypto').innerText = r[7][1];
                document.getElementById('cb1').onclick = () => window.open(r[7][3].trim(), '_blank');

                // 3. User Wallet & History Logic
                let uid = document.getElementById('user-id-input').value.toUpperCase().trim();
                let balanceDiv = document.getElementById('balance-display');
                let historyDiv = document.getElementById('user-history');

                if(uid === "") { balanceDiv.innerText = "RS. 0"; historyDiv.innerText = "Enter ID to see history..."; return; }

                let found = false;
                for(let i = 11; i < r.length; i++) {
                    if(r[i][0] && r[i][0].trim().toUpperCase() === uid) {
                        balanceDiv.innerText = "RS. " + r[i][1].trim();
                        balanceDiv.style.color = "#27ae60";
                        historyDiv.innerText = "ID: " + uid + " | " + (r[i][2] || "No recent activity found.");
                        found = true; break;
                    }
                }
                if(!found) { balanceDiv.innerText = "INVALID"; balanceDiv.style.color = "#e74c3c"; historyDiv.innerText = "ID not found in our database."; }

            } catch (e) { console.error("Sync Error:", e); }
        }

        function syncItem(pId, tId, bId, rowData) {
            document.getElementById(pId).innerText = rowData[1];
            document.getElementById(tId).innerText = rowData[2];
            document.getElementById(bId).onclick = () => window.open(rowData[3].trim(), '_blank');
        }

        function toggleLang() {
            isUrdu = !isUrdu;
            document.getElementById('h-air').innerText = isUrdu ? "ایئر لائنز اور سفر" : "AIRLINES & TRAVEL";
            document.getElementById('h-food').innerText = isUrdu ? "برانڈز اور فنانس" : "BRANDS & FINANCE";
            document.getElementById('h-hist').innerText = isUrdu ? "حالیہ سرگرمی:" : "Recent Activity:";
            document.getElementById('user-id-input').placeholder = isUrdu ? "آئی ڈی" : "Enter ID";
        }

        setInterval(syncAllData, 5000);
        syncAllData();
    </script>
</body>
</html>
